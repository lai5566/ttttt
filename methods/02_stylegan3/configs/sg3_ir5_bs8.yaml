# StyleGAN3 Configuration for Brain Stroke CT Dataset (IR=20)
# 3-class conditional generation: Normal, Ischemia, Bleeding
#
# Dataset Info:
#   - Normal:    3541 images (class0)
#   - Ischemia:   177 images (class1)
#   - Bleeding:   177 images (class2)
#   - Total:     3895 images
#   - Imbalance Ratio (IR): 20

DATA:
  name: "BrainStrokeIR5"
  img_size: 256
  num_classes: 3
  img_channels: 3

MODEL:
  backbone: "stylegan3"
  g_cond_mtd: "cAdaIN"
  d_cond_mtd: "SPD"
  g_act_fn: "Auto"
  d_act_fn: "Auto"
  z_prior: "gaussian"
  z_dim: 512
  w_dim: 512
  g_conv_dim: "N/A"
  d_conv_dim: "N/A"
  apply_g_ema: True

LOSS:
  adv_loss: "logistic"
  apply_r1_reg: True
  r1_lambda: 2.0
  r1_place: "outside_loop"

OPTIMIZATION:
  batch_size: 8
  acml_steps: 1
  g_lr: 0.0025
  d_lr: 0.002
  beta1: 0.0
  beta2: 0.99
  d_first: False
  g_updates_per_step: 1
  d_updates_per_step: 1
  total_steps: 125000

STYLEGAN:
  stylegan3_cfg: "stylegan3-t"
  g_reg_interval: 1
  d_reg_interval: 16
  mapping_network: 2
  style_mixing_p: 0
  g_ema_kimg: 10
  g_ema_rampup: "N/A"
  apply_pl_reg: False
  pl_weight: 0
  d_architecture: "resnet"
  d_epilogue_mbstd_group_size: 4
  blur_init_sigma: 0

PRE:
  apply_rflip: True

AUG:
  apply_ada: True
  ada_aug_type: "bgc"
  ada_initial_augment_p: 0
  ada_target: 0.6
  ada_kimg: 500
  ada_interval: 4
